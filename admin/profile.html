<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VH Vastgoed — Profiel</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="dashboard-page">

    <!-- Top bar -->
    <header class="topbar">
        <div class="topbar-left">
            <img src="../assets/logo_transparent.png" alt="VH Vastgoed" class="topbar-logo">
            <h1 class="topbar-title">Mijn Profiel</h1>
        </div>
        <div class="topbar-right">
            <span class="topbar-user" id="userEmail"></span>
            <button class="btn btn-secondary btn-sm" id="logoutBtn">Uitloggen</button>
        </div>
    </header>

    <nav class="admin-nav">
        <a href="dashboard.html" class="admin-nav-link">
            <i class="fas fa-th-large"></i> Overzicht
        </a>
        <a href="property-form.html" class="admin-nav-link">
            <i class="fas fa-plus"></i> Nieuw Pand
        </a>
        <a href="sort-order.html" class="admin-nav-link">
            <i class="fas fa-sort"></i> Volgorde
        </a>
        <a href="team.html" class="admin-nav-link">
            <i class="fas fa-users"></i> Team
        </a>
        <a href="profile.html" class="admin-nav-link active">
            <i class="fas fa-user"></i> Profiel
        </a>
        <a href="settings.html" class="admin-nav-link">
            <i class="fas fa-cog"></i> Instellingen
        </a>
    </nav>

    <main class="dashboard-main">
        <div class="profile-container">

            <!-- Profile photo -->
            <div class="profile-photo-section">
                <div class="profile-photo" id="profilePhoto">
                    <i class="fas fa-user-tie" id="profilePhotoPlaceholder"></i>
                    <img src="" alt="Profielfoto" id="profilePhotoImg" style="display:none;">
                    <div class="profile-photo-overlay" id="profilePhotoOverlay">
                        <i class="fas fa-camera"></i>
                        <span>Wijzigen</span>
                    </div>
                </div>
                <input type="file" id="photoFileInput" accept="image/*" style="display:none;">
                <button class="btn btn-sm btn-secondary" id="removePhotoBtn" style="display:none;">
                    <i class="fas fa-trash"></i> Foto verwijderen
                </button>
            </div>

            <!-- Profile form -->
            <form id="profileForm" class="profile-form" novalidate>
                <div class="form-section open">
                    <div class="section-body">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="profile_first_name">Voornaam *</label>
                                <input type="text" id="profile_first_name" required>
                            </div>
                            <div class="form-group">
                                <label for="profile_last_name">Achternaam *</label>
                                <input type="text" id="profile_last_name" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="profile_email">E-mail *</label>
                                <input type="email" id="profile_email" required>
                            </div>
                            <div class="form-group">
                                <label for="profile_phone">Telefoon</label>
                                <input type="text" id="profile_phone">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="profile_title">Functietitel</label>
                                <input type="text" id="profile_title">
                            </div>
                            <div class="form-group">
                                <label for="profile_biv">BIV nummer</label>
                                <input type="text" id="profile_biv">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group full">
                                <label for="profile_bio">Bio</label>
                                <textarea id="profile_bio" rows="4" placeholder="Vertel iets over jezelf..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="saveProfileBtn">
                        <i class="fas fa-save"></i> Opslaan
                    </button>
                </div>
            </form>

            <!-- No profile message -->
            <div class="profile-no-match" id="profileNoMatch" style="display:none;">
                <i class="fas fa-exclamation-triangle"></i>
                <h3>Geen profiel gevonden</h3>
                <p>Er is geen makelaarsprofiel gekoppeld aan je account. Vraag een beheerder om je toe te voegen via de Team-pagina.</p>
            </div>

        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast" style="display:none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>

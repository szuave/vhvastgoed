<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VH Vastgoed — Team</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="dashboard-page">

    <!-- Top bar -->
    <header class="topbar">
        <div class="topbar-left">
            <img src="../assets/logo_transparent.png" alt="VH Vastgoed" class="topbar-logo">
            <h1 class="topbar-title">Team</h1>
        </div>
        <div class="topbar-right">
            <span class="topbar-user" id="userEmail"></span>
            <button class="btn btn-secondary btn-sm" id="logoutBtn">Uitloggen</button>
        </div>
    </header>

    <nav class="admin-nav">
        <a href="dashboard.html" class="admin-nav-link">
            <i class="fas fa-th-large"></i> Overzicht
        </a>
        <a href="property-form.html" class="admin-nav-link">
            <i class="fas fa-plus"></i> Nieuw Pand
        </a>
        <a href="sort-order.html" class="admin-nav-link">
            <i class="fas fa-sort"></i> Volgorde
        </a>
        <a href="team.html" class="admin-nav-link active">
            <i class="fas fa-users"></i> Team
        </a>
        <a href="profile.html" class="admin-nav-link">
            <i class="fas fa-user"></i> Profiel
        </a>
        <a href="settings.html" class="admin-nav-link">
            <i class="fas fa-cog"></i> Instellingen
        </a>
    </nav>

    <main class="dashboard-main">

        <!-- Toolbar -->
        <section class="toolbar">
            <div class="toolbar-left">
                <h2 style="font-size:1.1rem;font-weight:700;">Makelaars</h2>
            </div>
            <div class="toolbar-right">
                <button class="btn btn-primary" id="addAgentBtn"><i class="fas fa-plus"></i> Nieuwe makelaar</button>
            </div>
        </section>

        <!-- Agents list -->
        <section class="team-grid" id="teamGrid">
            <div class="table-empty">Team wordt geladen...</div>
        </section>

    </main>

    <!-- Add/Edit Agent Modal -->
    <div class="modal-overlay" id="agentModal" style="display:none;">
        <div class="modal-card" style="max-width:560px;">
            <h2 class="modal-title" id="modalTitle">Nieuwe makelaar</h2>
            <form id="agentForm" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="agent_first_name">Voornaam *</label>
                        <input type="text" id="agent_first_name" required>
                    </div>
                    <div class="form-group">
                        <label for="agent_last_name">Achternaam *</label>
                        <input type="text" id="agent_last_name" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="agent_email">E-mail *</label>
                        <input type="email" id="agent_email" required>
                    </div>
                    <div class="form-group">
                        <label for="agent_phone">Telefoon</label>
                        <input type="text" id="agent_phone">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="agent_title">Functietitel</label>
                        <input type="text" id="agent_title" value="Vastgoedmakelaar">
                    </div>
                    <div class="form-group">
                        <label for="agent_biv">BIV nummer</label>
                        <input type="text" id="agent_biv">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full">
                        <label for="agent_bio">Bio</label>
                        <textarea id="agent_bio" rows="3" placeholder="Korte beschrijving..."></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full">
                        <label>
                            <input type="checkbox" id="agent_is_active" checked>
                            Actief
                        </label>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelAgent">Annuleren</button>
                    <button type="submit" class="btn btn-primary" id="saveAgentBtn">Opslaan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete confirmation modal -->
    <div class="modal-overlay" id="deleteAgentModal" style="display:none;">
        <div class="modal-card">
            <h2 class="modal-title">Makelaar verwijderen</h2>
            <p class="modal-text">Weet je zeker dat je deze makelaar wilt verwijderen? Dit kan niet ongedaan worden gemaakt.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelDeleteAgent">Annuleren</button>
                <button class="btn btn-danger" id="confirmDeleteAgent">Verwijderen</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" style="display:none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/team.js"></script>
</body>
</html>
